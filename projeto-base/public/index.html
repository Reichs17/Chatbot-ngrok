<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Kojima - Seu assistente de saúde inteligente">
  <link rel="stylesheet" href="style.css">
  <title>Kojima - Assistente de Saúde</title>
</head>
<body>
<header class="header">
    <h1><img src="Kojima_Productions_logo.png" alt="Kojima">Kojima - Seu Assistente de Saúde</h1>
</header>

  <div class="chat-container" id="chat">
    <div class="messages" id="messages"></div>
    <div class="suggestion-box" id="suggestion-box">
      <div class="suggestions">
        <div class="suggestion"></div>
        <button class="suggestion-button" title="Mais sugestões">⋯</button>
      </div>
    </div>
    <div class="input-box">
      <input type="text" id="input" placeholder="Digite sua pergunta de saúde..." autocomplete="off">
      <button id="send">Enviar</button>
      <button id="speak" title="Falar">🎤</button>
    </div>
  </div>
  <div style="position: fixed; bottom: 10px; left: 10px; background: #000000; padding: 5px 10px; border-radius: 5px; font-size: 12px; opacity: 0.8; color: #aac6ff;">
    🤖 Kojima Online
  </div>
</body>
<script src="script.js"></script>
</html>
